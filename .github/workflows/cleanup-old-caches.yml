name: Cleanup Old Caches

on:
  schedule:
    # Automatically runs every Monday at 00:00 UTC
    - cron: "0 0 * * 1"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run mode (only print, no deletion)"
        required: false
        default: false
        type: boolean

jobs:
  cleanup-caches:
    name: Cleanup Duplicate Prefix Caches
    runs-on: ubuntu-latest
    permissions:
      actions: write # Required permission to delete caches

    steps:
      - name: Fetch and Cleanup Old Caches
        uses: actions/github-script@v7
        with:
          script: |
            const DRY_RUN = '${{ github.event.inputs.dry_run }}' === 'true';
            const owner   = context.repo.owner;
            const repo    = context.repo.repo;

            // ── 1. Fetch all cache entries ──────────────────────────────────────
            let allCaches = [];
            let page = 1;
            while (true) {
              const { data } = await github.rest.actions.getActionsCacheList({
                owner, repo,
                per_page: 100,
                page,
                sort: 'created_at',
                direction: 'desc',   // newest first
              });
              if (!data.actions_caches.length) break;
              allCaches = allCaches.concat(data.actions_caches);
              if (data.actions_caches.length < 100) break;
              page++;
            }

            console.log(`📦 Found ${allCaches.length} cache entries`);

            // ── 2. Group by prefix ────────────────────────────────────────────
            // Prefix definition: part before the last '-' in the key
            // e.g., "npm-cache-abc123" → prefix "npm-cache"
            // If the key contains no '-', the whole key is considered the prefix
            function getPrefix(key) {
              const idx = key.lastIndexOf('-');
              return idx > 0 ? key.substring(0, idx) : key;
            }

            const groups = {};
            for (const cache of allCaches) {
              const prefix = getPrefix(cache.key);
              if (!groups[prefix]) groups[prefix] = [];
              groups[prefix].push(cache);
            }

            // ── 3. Keep only the newest cache per prefix, mark the rest for deletion ──────────────
            const toDelete = [];
            for (const [prefix, caches] of Object.entries(groups)) {
              // Already sorted by created_at desc, index 0 is the newest
              const [keep, ...rest] = caches;
              if (rest.length === 0) continue;

              console.log(`\n🔑 Prefix: "${prefix}" — Keep: [${keep.key}], Delete ${rest.length} old cache(s)`);
              for (const c of rest) {
                console.log(`   ❌ ${c.key}  (id=${c.id}, created at ${c.created_at})`);
                toDelete.push(c);
              }
            }

            // ── 4. Summary ─────────────────────────────────────────────────
            if (toDelete.length === 0) {
              console.log('\n✅ No old caches to clean up, everything is tidy!');
              return;
            }

            console.log(`\n🗑️  Need to delete ${toDelete.length} cache(s) in total`);

            if (DRY_RUN) {
              console.log('🔍 Dry run mode enabled, skipping actual deletion.');
              return;
            }

            // ── 5. Perform deletion ──────────────────────────────────────────────
            let deleted = 0;
            let failed  = 0;
            for (const cache of toDelete) {
              try {
                await github.rest.actions.deleteActionsCacheById({
                  owner, repo,
                  cache_id: cache.id,
                });
                console.log(`   ✅ Deleted: ${cache.key} (id=${cache.id})`);
                deleted++;
              } catch (err) {
                console.error(`   ⚠️  Deletion failed: ${cache.key} — ${err.message}`);
                failed++;
              }
            }

            console.log(`\n🎉 Cleanup complete: ${deleted} successfully deleted, ${failed} failed.`);
